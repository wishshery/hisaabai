<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#10b981"/>
<meta name="description" content="HisaabAI - AI-powered Urdu bookkeeping for Pakistani small traders"/>
<title>HisaabAI — حساب AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%2310b981'/><text x='50' y='66' text-anchor='middle' font-size='46' fill='white' font-family='serif'>حا</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#10b981;--brand-dark:#059669;--brand-darker:#047857;--brand-light:#d1fae5;--brand-pale:#ecfdf5;
  --red:#ef4444;--red-light:#fef2f2;--amber:#f59e0b;--amber-light:#fffbeb;--blue:#3b82f6;--blue-light:#eff6ff;
  --g0:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g3:#d1d5db;--g4:#9ca3af;--g5:#6b7280;--g6:#4b5563;--g7:#374151;--g8:#1f2937;--g9:#111827;
  --white:#ffffff;--black:#000000;
  --fu:'Noto Nastaliq Urdu',serif;--fm:'Inter',system-ui,-apple-system,sans-serif;
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:24px;--r-full:9999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --shadow-brand:0 8px 24px rgba(16,185,129,.35);
  --nav-h:72px;--header-h:60px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{height:100%;overflow:hidden}
body{font-family:var(--fm);background:var(--g0);color:var(--g8);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}
/* HEADER */
.header{
  background:var(--white);
  padding:calc(var(--safe-top) + 12px) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--g1);
  position:relative;z-index:10;
  min-height:var(--header-h);
}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{
  width:38px;height:38px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  color:var(--white);font-size:16px;font-family:var(--fu);font-weight:700;
  box-shadow:var(--shadow-brand);
}
.header-name{display:flex;flex-direction:column;line-height:1.1}
.header-name .en{font-size:17px;font-weight:700;color:var(--g9);letter-spacing:-.3px}
.header-name .ur{font-family:var(--fu);font-size:14px;color:var(--brand-dark);font-weight:600}
.header-right{display:flex;align-items:center;gap:8px}
.avatar-btn{
  width:36px;height:36px;background:linear-gradient(135deg,var(--brand-light),var(--brand));
  border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--brand-darker);
}
.notif-btn{
  width:36px;height:36px;background:var(--g1);border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:17px;position:relative;
}
.notif-dot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;
  background:var(--red);border-radius:50%;border:2px solid var(--white);
}
/* SCROLL CONTENT */
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}
/* BOTTOM NAV */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  background:var(--white);border-top:1px solid var(--g2);
  display:flex;align-items:flex-start;padding-top:10px;padding-bottom:var(--safe-bottom);
  z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:4px 0;
  font-family:var(--fm);
}
.nav-item.voice-nav{position:relative;margin-top:-28px}
.nav-icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-label{font-size:10px;font-weight:500;color:var(--g4);transition:color .2s;letter-spacing:.2px}
.nav-item.active .nav-label{color:var(--brand)}
.nav-item.active .nav-icon{transform:scale(1.1)}
.voice-fab{
  width:60px;height:60px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-brand);border:3px solid var(--white);
  font-size:26px;
}
.voice-fab.recording{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 8px 24px rgba(239,68,68,.4)}
.nav-item.voice-nav .nav-label{margin-top:6px}
/* DASHBOARD */
.page{padding:16px}
.greeting-card{
  background:linear-gradient(135deg,var(--brand-darker) 0%,var(--brand-dark) 50%,#065f46 100%);
  border-radius:var(--r-xl);padding:20px;margin-bottom:16px;color:var(--white);
  position:relative;overflow:hidden;
}
.greeting-card::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  background:rgba(255,255,255,.08);border-radius:50%;
}
.greeting-card::after{
  content:'';position:absolute;bottom:-20px;right:40px;width:80px;height:80px;
  background:rgba(255,255,255,.05);border-radius:50%;
}
.greeting-text{font-size:13px;opacity:.8;margin-bottom:2px}
.greeting-name{font-size:20px;font-weight:700;margin-bottom:12px}
.greeting-balance{font-size:13px;opacity:.75;margin-bottom:4px}
.greeting-amount{font-size:32px;font-weight:800;letter-spacing:-1px}
.greeting-ur{font-family:var(--fu);font-size:14px;opacity:.7;margin-top:6px}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{
  background:var(--white);border-radius:var(--r-lg);padding:14px;
  box-shadow:var(--shadow-sm);border:1px solid var(--g1);
}
.stat-icon-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon.green{background:var(--brand-pale)}
.stat-icon.red{background:var(--red-light)}
.stat-icon.blue{background:var(--blue-light)}
.stat-icon.amber{background:var(--amber-light)}
.stat-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r-full);letter-spacing:.2px}
.stat-badge.up{background:var(--brand-pale);color:var(--brand-darker)}
.stat-badge.down{background:var(--red-light);color:#b91c1c}
.stat-label{font-size:11px;color:var(--g4);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-label .ur{font-family:var(--fu);font-size:11px;text-transform:none;letter-spacing:0;margin-right:4px;color:var(--g4)}
.stat-value{font-size:22px;font-weight:700;color:var(--g9);letter-spacing:-.5px}
.stat-value.green{color:var(--brand-dark)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}.stat-value.amber{color:var(--amber)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:var(--g9)}
.section-title .ur{font-family:var(--fu);font-size:14px;color:var(--g4);margin-right:6px}
.see-all{font-size:13px;color:var(--brand);font-weight:500;background:none;border:none;cursor:pointer}

.tx-card{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid var(--g1);overflow:hidden;margin-bottom:16px}
.tx-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--g1)}
.tx-item:last-child{border-bottom:none}
.tx-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-avatar.in{background:var(--brand-pale)}.tx-avatar.out{background:var(--red-light)}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;color:var(--g8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-name-ur{font-family:var(--fu);font-size:12px;color:var(--g4);display:block}
.tx-date{font-size:11px;color:var(--g4);margin-top:2px}
.tx-amount{font-size:15px;font-weight:700;text-align:right}
.tx-amount.in{color:var(--brand-dark)}.tx-amount.out{color:var(--red)}
.tx-amount-label{font-size:10px;color:var(--g4);text-align:right;margin-top:2px;font-weight:500}
/* VOICE PAGE */
.voice-page{
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  min-height:calc(100vh - var(--header-h) - var(--nav-h));
  padding:24px 20px;
  background:linear-gradient(180deg,#ecfdf5 0%,#ffffff 100%);
}
.voice-hero{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.voice-title{font-size:22px;font-weight:800;color:var(--g9);text-align:center;margin-bottom:4px}
.voice-subtitle{font-family:var(--fu);font-size:22px;color:var(--brand-dark);text-align:center;margin-bottom:8px;direction:rtl}
.voice-desc{font-size:14px;color:var(--g5);text-align:center;margin-bottom:40px;line-height:1.6;max-width:280px}

/* THE HERO MIC BUTTON */
.mic-container{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:40px}
.mic-ring-outer{
  position:absolute;width:180px;height:180px;border-radius:50%;
  border:2px solid rgba(16,185,129,.2);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.mic-ring-mid{
  position:absolute;width:148px;height:148px;border-radius:50%;
  border:2px solid rgba(16,185,129,.3);
  animation:ringPulse 2.5s ease-in-out infinite .4s;
}
.mic-ring-inner{
  position:absolute;width:116px;height:116px;border-radius:50%;
  background:rgba(16,185,129,.08);
  animation:ringPulse 2.5s ease-in-out infinite .8s;
}
.mic-btn{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(145deg,var(--brand),var(--brand-darker));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
  box-shadow:0 12px 32px rgba(16,185,129,.45),0 4px 12px rgba(16,185,129,.3);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:2;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn:active{transform:scale(.94)}
.mic-btn.recording{
  background:linear-gradient(145deg,#ef4444,#dc2626);
  box-shadow:0 12px 32px rgba(239,68,68,.45),0 4px 12px rgba(239,68,68,.3);
  animation:micPulse 1.2s ease-in-out infinite;
}
.mic-btn.recording .mic-ring-outer,.mic-btn.recording .mic-ring-mid{border-color:rgba(239,68,68,.3)}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.6}}
@keyframes micPulse{0%,100%{transform:scale(1);box-shadow:0 12px 32px rgba(239,68,68,.45)}50%{transform:scale(1.05);box-shadow:0 16px 40px rgba(239,68,68,.6)}}

.mic-status{
  font-size:15px;font-weight:600;color:var(--g6);text-align:center;margin-bottom:8px;
  min-height:24px;transition:color .3s;
}
.mic-status.listening{color:var(--brand-dark)}
.mic-status.recording{color:var(--red)}
.mic-wave{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:24px;opacity:0;transition:opacity .3s}
.mic-wave.active{opacity:1}
.wave-bar{width:4px;background:var(--brand);border-radius:2px;animation:waveBounce .8s ease-in-out infinite}
.wave-bar:nth-child(1){animation-delay:.0s;height:12px}
.wave-bar:nth-child(2){animation-delay:.1s;height:22px}
.wave-bar:nth-child(3){animation-delay:.2s;height:30px}
.wave-bar:nth-child(4){animation-delay:.3s;height:22px}
.wave-bar:nth-child(5){animation-delay:.4s;height:16px}
.wave-bar:nth-child(6){animation-delay:.3s;height:28px}
.wave-bar:nth-child(7){animation-delay:.2s;height:18px}
@keyframes waveBounce{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

.voice-result-card{
  width:100%;background:var(--white);border-radius:var(--r-xl);
  padding:20px;box-shadow:var(--shadow-md);border:1px solid var(--g1);
  margin-bottom:16px;
}
.voice-result-ur{
  font-family:var(--fu);font-size:20px;color:var(--g8);text-align:right;
  direction:rtl;margin-bottom:14px;line-height:1.7;
  padding:12px 14px;background:var(--brand-pale);border-radius:var(--r-md);
}
.parsed-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.parsed-item{background:var(--g0);border-radius:var(--r-sm);padding:10px 12px}
.parsed-key{font-size:11px;color:var(--g4);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.parsed-val{font-size:14px;font-weight:600;color:var(--g8)}
.parsed-val.income{color:var(--brand-dark)}.parsed-val.expense{color:var(--red)}

.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r-lg);
  font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fm);
  transition:all .2s;
}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:var(--white);box-shadow:var(--shadow-brand)}
.btn-primary:active{transform:scale(.98)}
.btn-outline{background:var(--g0);color:var(--g6);border:1.5px solid var(--g2);margin-top:8px}

.voice-examples{width:100%}
.examples-title{font-size:13px;font-weight:600;color:var(--g5);margin-bottom:10px;text-align:center;letter-spacing:.3px}
.example-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--white);border:1.5px solid var(--g2);border-radius:var(--r-full);
  padding:10px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;
}
.example-chip:active{background:var(--brand-pale);border-color:var(--brand)}
.example-chip .chip-ur{font-family:var(--fu);font-size:15px;color:var(--g7);direction:rtl;flex:1;text-align:right}
.example-chip .chip-en{font-size:12px;color:var(--g4)}
/* REPORTS */
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.period-tabs{display:flex;background:var(--g1);border-radius:var(--r-sm);padding:3px;gap:2px}
.period-tab{
  padding:5px 12px;border:none;background:transparent;border-radius:7px;
  font-size:12px;font-weight:500;color:var(--g5);cursor:pointer;transition:all .2s;font-family:var(--fm);
}
.period-tab.active{background:var(--white);color:var(--g9);box-shadow:var(--shadow-sm)}

.chart-wrap{padding:8px 0 16px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 4px}
.chart-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:0}
.chart-pair{display:flex;align-items:flex-end;gap:2px;height:120px}
.bar{border-radius:6px 6px 0 0;min-height:4px;transition:height .6s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.bar.inc{background:linear-gradient(180deg,#34d399,#10b981)}
.bar.exp{background:linear-gradient(180deg,#f87171,#ef4444)}
.bar:hover{opacity:.8;transform:scaleX(1.1)}
.bar-day{font-size:9px;color:var(--g4);margin-top:6px;text-align:center;letter-spacing:.2px}
.bar-day-ur{font-family:var(--fu);font-size:10px;color:var(--g4);display:block;text-align:center;line-height:1}
.chart-legend{display:flex;justify-content:center;gap:20px;margin-top:4px}
.legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g6)}
.legend-dot{width:10px;height:10px;border-radius:3px}

.summary-chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.summary-chip{
  background:var(--white);border-radius:var(--r-lg);padding:12px;
  text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--g1);
}
.chip-label{font-size:10px;color:var(--g4);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.chip-val{font-size:15px;font-weight:700;letter-spacing:-.4px}

/* CREDIT SCORE */
.score-hero{
  background:linear-gradient(135deg,var(--brand-darker),var(--brand));
  border-radius:var(--r-xl);padding:28px 20px;text-align:center;
  margin-bottom:16px;color:var(--white);position:relative;overflow:hidden;
}
.score-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%}
.score-label{font-size:13px;opacity:.8;margin-bottom:4px;font-weight:500}
.score-number{font-size:64px;font-weight:800;line-height:1;letter-spacing:-2px;margin-bottom:4px}
.score-status{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.2);border-radius:var(--r-full);
  padding:5px 14px;font-size:13px;font-weight:600;
}
.score-ur{font-family:var(--fu);font-size:16px;opacity:.75;margin-top:10px}

.gauge-svg-wrap{margin:4px auto 16px;display:block}
.factors-card{background:var(--white);border-radius:var(--r-xl);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--g1)}
.factors-title{font-size:15px;font-weight:700;color:var(--g9);margin-bottom:16px}
.factor-row{margin-bottom:14px}
.factor-row:last-child{margin-bottom:0}
.factor-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.factor-name{font-size:13px;font-weight:600;color:var(--g7)}
.factor-name-ur{font-family:var(--fu);font-size:12px;color:var(--g4)}
.factor-pct{font-size:13px;font-weight:700;color:var(--g9)}
.factor-track{height:8px;background:var(--g1);border-radius:var(--r-full);overflow:hidden}
.factor-fill{height:100%;border-radius:var(--r-full);transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* QUICK ACTION FAB */
.quick-add{
  position:absolute;right:20px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 20px);
  width:52px;height:52px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--white);
  box-shadow:var(--shadow-brand);z-index:50;transition:transform .2s;
}
.quick-add:active{transform:scale(.93)}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;color:var(--g4)}

/* UTILITY */
.card{background:var(--white);border-radius:var(--r-xl);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--g1);margin-bottom:16px}
.divider{height:1px;background:var(--g1);margin:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;
const TX=[
  {id:1,date:'Mar 24',desc:'Cloth sale to Ahmed',ur:'احمد کو کپڑا',amount:15000,type:'in',icon:'👔'},
  {id:2,date:'Mar 24',desc:'Electricity bill',ur:'بجلی بل',amount:3200,type:'out',icon:'⚡'},
  {id:3,date:'Mar 23',desc:'Wholesale fabric',ur:'تھوک کپڑا',amount:25000,type:'out',icon:'🛒'},
  {id:4,date:'Mar 23',desc:'Cash sale walk-in',ur:'نقد فروخت',amount:8500,type:'in',icon:'💰'},
  {id:5,date:'Mar 22',desc:'Stitching order - Bilal',ur:'سلائی آرڈر',amount:12000,type:'in',icon:'✂️'},

function VoicePage({onAdd}){
  const[state,setState]=useState('idle'); // idle|listening|done
  const[result,setResult]=useState(null);
  const timerRef=useRef(null);

  const handleMic=useCallback(()=>{
    if(state==='idle'){
      setState('listening');
      timerRef.current=setTimeout(()=>{
        const m=MOCK_VOICE[Math.floor(Math.random()*MOCK_VOICE.length)];
        setResult(m); setState('done');
      },2200);
    } else if(state==='listening'){
      clearTimeout(timerRef.current);
      const m=MOCK_VOICE[Math.floor(Math.random()*MOCK_VOICE.length)];
      setResult(m); setState('done');
    } else {
      setResult(null); setState('idle');
    }
  },[state]);

  const handleSave=()=>{
    if(result){ onAdd({id:Date.now(),...result,date:'Today',icon:result.type==='in'?'💰':'💸'}); setResult(null); setState('idle'); }
  };

  const statusText=state==='idle'?'بولنے کے لیے دبائیں':state==='listening'?'سن رہے ہیں...':'';
  const statusEn=state==='idle'?'Tap to record your transaction':state==='listening'?'Listening... speak now':'';

  return(
    <div className="voice-page">
      <div className="voice-hero">
        <div className="voice-title">Voice Entry</div>
        <div className="voice-subtitle">آواز سے انٹری</div>
        <div className="voice-desc">Speak in Urdu — AI will understand and record your transaction automatically</div>
        
        <div className="mic-container">
          {state==='idle'&&<><div className="mic-ring-outer"/><div className="mic-ring-mid"/><div className="mic-ring-inner"/></>}
          <button className={"mic-btn"+(state==='listening'?' recording':'')} onClick={handleMic}>
            {state==='listening'?'⏹':'🎙️'}
          </button>
        </div>

        <div className={"mic-status"+(state==='listening'?' listening':'')}>{statusText}</div>
        <div className="voice-desc" style={{marginBottom:'12px'}}>{statusEn}</div>

        <div className={"mic-wave"+(state==='listening'?' active':'')}>
          {[1,2,3,4,5,6,7].map(i=><div key={i} className="wave-bar"/>)}
        </div>
      </div>

      {result&&(
        <div style={{width:'100%',paddingBottom:'8px'}}>
          <div className="voice-result-card">
            <div className="voice-result-ur">{result.ur}</div>
            <div className="parsed-grid">
              <div className="parsed-item"><div className="parsed-key">Party</div><div className="parsed-val">{result.party}</div></div>
              <div className="parsed-item"><div className="parsed-key">Amount</div><div className={"parsed-val "+(result.type==='in'?'income':'expense')}>Rs {result.amount.toLocaleString()}</div></div>
              <div className="parsed-item"><div className="parsed-key">Type</div><div className={"parsed-val "+(result.type==='in'?'income':'expense')}>{result.type==='in'?'آمدن Income':'خرچ Expense'}</div></div>
              <div className="parsed-item"><div className="parsed-key">Description</div><div className="parsed-val" style={{fontSize:'12px'}}>{result.desc}</div></div>
            </div>
            <button className="btn btn-primary" onClick={handleSave}>✓ Save Entry محفوظ</button>
            <button className="btn btn-outline" onClick={()=>{setResult(null);setState('idle');}}>Try Again واپس</button>
          </div>
        </div>
      )}

      {state==='idle'&&!result&&(
        <div className="voice-examples">
          <div className="examples-title">TRY SAYING — یہ بولیں</div>
          {EXAMPLES.map((e,i)=>(
            <div key={i} className="example-chip" onClick={handleMic}>
              <span style={{fontSize:'16px'}}>🗣️</span>
              <span className="chip-ur">{e.ur}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function Reports(){

          <div className="chart-legend">
            <div className="legend"><div className="legend-dot" style={{background:'#10b981'}}/>آمدن Income</div>
            <div className="legend"><div className="legend-dot" style={{background:'#ef4444'}}/>اخراجات Expense</div>
          </div>
        </div>
      </div>
      <div className="summary-chips">
        <div className="summary-chip">
          <div className="chip-label">آمدن</div>
          <div className="chip-val" style={{color:'#059669'}}>Rs {(totInc/1000).toFixed(0)}K</div>
        </div>
        <div className="summary-chip">
          <div className="chip-label">اخراج</div>
          <div className="chip-val" style={{color:'#ef4444'}}>Rs {(totExp/1000).toFixed(0)}K</div>
        </div>
        <div className="summary-chip">
          <div className="chip-label">منافع</div>
          <div className="chip-val" style={{color:'#3b82f6'}}>Rs {((totInc-totExp)/1000).toFixed(0)}K</div>
        </div>
      </div>
      <div className="card">
        <div className="section-title" style={{marginBottom:'14px'}}><span className="ur">لین دین</span>All Transactions</div>
        {TX.map(tx=>(
          <div key={tx.id}>
            <div className="tx-item" style={{padding:'12px 0',borderBottom:'1px solid var(--g1)'}}>
              <div className={"tx-avatar "+tx.type}>{tx.icon}</div>
              <div className="tx-info">
                <span className="tx-name">{tx.desc}</span>
                <span className="tx-name-ur">{tx.ur}</span>
              </div>
              <div className={"tx-amount "+tx.type}>{tx.type==='in'?'+':'-'} Rs {tx.amount.toLocaleString()}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CreditScore(){

  const factors=[

    {name:'Credit Usage',ur:'قرض استعمال',pct:78,color:'#3b82f6'},

    {name:'Transactions',ur:'لین دین',pct:85,color:'#8b5cf6'},
  ];
  const r=70,cx=100,cy=80,circ=2*Math.PI*r;
  return(
    <div className="page">
      <div className="score-hero">
        <div className="score-label">Your Credit Score</div>
        <div className="score-number">{score}</div>
        <div className="score-status">✅ Good • اچھا</div>
        <div className="score-ur">کریڈٹ سکور — اچھی حالت</div>
        <svg className="gauge-svg-wrap" width="200" height="100" viewBox="0 0 200 100">
          <path d="M20,90 A80,80 0 0,1 180,90" fill="none" stroke="rgba(255,255,255,.2)" strokeWidth="14" strokeLinecap="round"/>
          <path d="M20,90 A80,80 0 0,1 180,90" fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="14" strokeLinecap="round"
            strokeDasharray="251" strokeDashoffset={251*(1-pct)} style={{transition:'stroke-dashoffset 1s ease'}}/>
        </svg>
        <div style={{fontSize:'12px',opacity:.7}}>out of {max} points</div>
      </div>
      <div className="factors-card">
        <div className="factors-title">📊 Score Factors — سکور عوامل</div>
        {factors.map(f=>(
          <div className="factor-row" key={f.name}>
            <div className="factor-top">
              <div><span className="factor-name">{f.name}</span><span className="factor-name-ur"> {f.ur}</span></div>
              <span className="factor-pct">{f.pct}%</span>
            </div>
            <div className="factor-track">
              <div className="factor-fill" style={{width:f.pct+'%',background:f.color}}/>
            </div>
          </div>
        ))}
      </div>
      <div className="card" style={{textAlign:'center',marginTop:'0'}}>
        <div style={{fontSize:'28px',marginBottom:'8px'}}>💼</div>
        <div style={{fontSize:'15px',fontWeight:'600',color:'var(--g8)',marginBottom:'4px'}}>Loan Eligibility</div>
        <div style={{fontFamily:'var(--fu)',fontSize:'14px',color:'var(--g5)',marginBottom:'12px'}}>قرض کی اہلیت</div>
        <div style={{fontSize:'28px',fontWeight:'800',color:'#10b981',letterSpacing:'-1px'}}>Rs 2,50,000</div>
        <div style={{fontSize:'12px',color:'var(--g4)',marginTop:'4px'}}>Pre-approved amount</div>
      </div>
    </div>
  );
}
function BottomNav({tab,setTab}){
  const tabs=[
    {k:'dashboard',icon:'🏠',label:'Home',ur:'گھر'},
    {k:'voice',icon:null,label:'Voice',ur:'آواز',isMic:true},
    {k:'reports',icon:'📊',label:'Reports',ur:'رپورٹ'},
    {k:'credit',icon:'⭐',label:'Credit',ur:'کریڈٹ'},
  ];
  return(
    <nav className="bottom-nav">
      {tabs.map(t=>(
        <button key={t.k} className={"nav-item"+(t.isMic?' voice-nav':'')+(tab===t.k?' active':'')} onClick={()=>setTab(t.k)}>
          {t.isMic?(
            <div className={"voice-fab"+(tab==='voice'?' recording':'')}>🎙️</div>
          ):(
            <span className="nav-icon" style={{fontSize:'22px'}}>{t.icon}</span>
          )}
          <span className="nav-label">{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

function App(){
  const[tab,setTab]=useState('dashboard');
  const[extraTx,setExtraTx]=useState([]);
  const addTx=useCallback((tx)=>{setExtraTx(p=>[tx,...p]);setTab('dashboard');},[]);
  return(
    <div className="app">
      <Header/>
      <div className="scroll-body">
        {tab==='dashboard'&&<Dashboard txList={extraTx}/>}
        {tab==='voice'&&<VoicePage onAdd={addTx}/>}
        {tab==='reports'&&<Reports/>}
        {tab==='credit'&&<CreditScore/>}
      </div>
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
